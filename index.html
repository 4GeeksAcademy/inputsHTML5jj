<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>verificacion de pago</title>
    <link href="style.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <div class="recuadroexterior border rounded" alt="75%">
        <form class="needs-validation" novalidate>
            <div class="navbar h1 p-2 fw-bold border ">
                Datos de pago
            </div>
            <div id="alerta-error" class="alert alert-danger d-none m-3 fw-bold" role="alert">
                ¡Cuidado! Algunos campos requeridos están vacíos.
            </div>

            <!--Este div contiene EL formulario-->
            <div class="container ">
                <div class="contenido">
                    <div class="row">
                        <div class="row">
                            <div class="col-6">
                                N. de Tarjeta
                                <input type="text" class="form-control" placeholder="123456789" required>
                            </div>

                            <div class="col-2">
                                CVC #
                                <input type="text" class="form-control" placeholder="xxx" required>
                            </div>

                            <div class="col-4">
                                Cantidad $
                                <input type="text" class="form-control" placeholder="$$$" required>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="row">
                            <div class="col">
                                Nombres <br>
                                <input type="text" class="form-control w-75" placeholder="Juan" required>
                            </div>
                            <div class="col w-50">
                                Apellidos <br>
                                <input type="text" class="form-control w-100 " placeholder="rendon" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-4">Ciudad <br><input type="text" class="form-control w-100"
                                    placeholder="Valencia" required></div>
                            <div class="col-4">Provincia <br><select class="form-control w-50">
                                    <option selected>Escoge tu provincia</option>
                                    <option>Valencia</option>
                                    <option>Barcelona</option>
                                    <option>Madrid</option>
                                </select>
                            </div>
                            <div class="col-3">Codigo Postal<br><input type="text" class="form-control" height="75px"
                                    required>
                            </div>
                        </div>

                    </div>
                </div>
                <div class="parteinferior mt-3">
                    <div class="row">
                        <div class="col-md-6">
                            <p class="mb-2">Medios de pago aceptados <i class="fa-regular fa-credit-card"></i></p>
                            <div class="compañias btn btn-secondary d-inline-flex align-items-center p-2">
                                <div class="form-check form-check-inline m-0">
                                    <input class="form-check-input" type="radio" name="inlineRadioOptions"
                                        id="inlineRadio1" value="option1" required>
                                    <label class="form-check-label" for="inlineRadio1"><i
                                            class="fa-brands fa-cc-mastercard fa-lg"></i></label>
                                </div>
                                <div class="form-check form-check-inline m-0">
                                    <input class="form-check-input" type="radio" name="inlineRadioOptions"
                                        id="inlineRadio2" value="option2">
                                    <label class="form-check-label" for="inlineRadio2"><i
                                            class="fa-brands fa-cc-paypal fa-lg"></i></label>
                                </div>
                                <div class="form-check form-check-inline m-0">
                                    <input class="form-check-input" type="radio" name="inlineRadioOptions"
                                        id="inlineRadio3" value="option3">
                                    <label class="form-check-label" for="inlineRadio3"><i
                                            class="fa-brands fa-cc-amex fa-lg"></i></label>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label for="mensaje" class="form-label">Notas adicionales:</label>
                            <textarea class="form-control" id="mensaje" rows="3"
                                placeholder="Escribe un mensaje aquí..."></textarea>
                            <div class="form-text">Añade cualquier instrucción especial para el pago.</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="botones d-flex justify-content-end navbar border">
                <button class="rounded btn btn-secondary me-2" alt="75%">cancelar</button>
                <button class="rounded btn btn-primary me-2" alt="75%" type="submit">enviar</button>
            </div>
    </div>
    </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
    <script>
        (() => {
            'use strict'
            const form = document.querySelector('form')
            const alerta = document.getElementById('alerta-error')

            form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()


                    alerta.classList.remove('d-none');


                    window.scrollTo(0, 0);
                } else {

                    alerta.classList.add('d-none');
                }

                form.classList.add('was-validated')
            }, false)
        })()
    </script>
</body>

</html>
